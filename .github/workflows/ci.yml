name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: goyal
          POSTGRES_PASSWORD: goyal_dev_password
          POSTGRES_DB: goyal_eoi
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://goyal:goyal_dev_password@localhost:5433/goyal_eoi?schema=public
      AUTH_SECRET: ci-test-auth-secret-min-32-chars-long
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: packages/db

      - name: Push database schema
        run: npx prisma db push --accept-data-loss
        working-directory: packages/db

      - name: Seed database
        run: npx tsx prisma/seed.ts
        working-directory: packages/db

      - name: Build application
        run: npm run build --workspace=@goyal/web

      - name: Run unit tests
        run: npm test --workspace=@goyal/web

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: apps/web

      - name: Run E2E tests
        run: npx playwright test
        working-directory: apps/web
